name: iamdataeng-evaluate

# Triggered on every push to any branch. The IAmDataEng app listens to the
# `workflow_run` webhook for this exact workflow name and ingests the verdict
# into the learner's dashboard. DO NOT rename this workflow.

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  evaluate:
    name: Evaluate transformation.rag-pipeline-pgvector
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Postgres + pgvector as a GitHub Actions service container.
    # Using the official pgvector image means the extension is shipped — we
    # only have to CREATE EXTENSION on the database.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+psycopg2://rag:rag@localhost:5432/rag
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      # Pin the HF cache so the model is reused across jobs and runs.
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      # CPU-only torch (avoid the 2GB CUDA wheel — we don't have a GPU).
      PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

    steps:
      - name: Checkout learner fork
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache the HuggingFace model
        # 80MB model. Caching it shaves ~30s off every CI run after the first.
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: hf-${{ env.EMBEDDING_MODEL }}-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        # The `services.postgres.options` healthcheck already gates job start,
        # but we add an explicit probe so the failure is unambiguous if the
        # network is being flaky.
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U rag; then
              echo "postgres ready"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did NOT become ready"
          exit 1

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=rag psql -h localhost -U rag -d rag \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Regenerate fixtures (deterministic, seed=42)
        # The fixtures are NOT committed (too large). We regenerate them from
        # the seeded script — byte-identical every time.
        run: python -m fixtures.generate_fixtures

      - name: Warm the sentence-transformers cache
        # First import takes ~5s. Pre-loading here makes the rubric's failure
        # messages cleaner — if the model can't load, fail HERE with context.
        run: |
          python -c "
          from sentence_transformers import SentenceTransformer
          m = SentenceTransformer('${EMBEDDING_MODEL}')
          v = m.encode(['warmup'], normalize_embeddings=True)
          print(f'model loaded, dim={v.shape[1]}')
          "

      - name: Run evaluation rubric
        run: pytest tests/ -v --tb=short
